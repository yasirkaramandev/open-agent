services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal
    ports: ["127.0.0.1:5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes: [signal-postgres:/var/lib/postgresql/data]

  redis:
    image: redis:8.0.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["127.0.0.1:6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    read_only: true
    tmpfs: ["/tmp"]
    environment:
      DATABASE_URL: postgresql+psycopg://signal:signal@postgres:5432/signal
      REDIS_URL: redis://redis:6379/0
      YOUTUBE_WRITE_ACTIONS_ENABLED: "false"
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  signal-postgres:
